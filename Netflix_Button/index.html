<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go To Netflix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        *{
            font-family: "Poppins", sans-serif;
        }

        .netflix {
            text-align: center;
        }

        .netflix button a img {
            padding: 20px;
            padding-bottom: 11px;
        }
        .netflix button {
            background-color: #000000;
            border-radius: 20px;
        }
        .netflix button:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }
        .netflix p{
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="netflix">
        <p>Click Here to go to Netflix</p>
        <button>
            <a target="_blank" href="https://www.netflix.com/in/">
                <img src="logo.svg" alt="Netflix" height="50px">
            </a>
        </button>
    </div>
</body>
</html>
